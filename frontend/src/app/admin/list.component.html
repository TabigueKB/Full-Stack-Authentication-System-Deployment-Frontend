<div class="mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>All Accounts</h4>
        <a routerLink="add" class="btn btn-sm btn-success">Add Account</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th style="width: 120px;"></th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let account of accounts">
                <td>{{ account.firstName }} {{ account.lastName }}</td>
                <td>{{ account.email }}</td>
                <td>{{ account.role }}</td>
                <td class="text-end">
                    <a routerLink="edit/{{ account.id }}" class="btn btn-sm btn-primary me-1">Edit</a>
                    <button (click)="deleteAccount(account.id)" class="btn btn-sm btn-danger" [disabled]="account.isDeleting">
                        <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm"></span>
                        <span *ngIf="!account.isDeleting">Delete</span>
                    </button>
                </td>
            </tr>
            <tr *ngIf="accounts.length === 0 && !error">
                <td colspan="4" class="text-center">Loading accounts...</td>
            </tr>
            <tr *ngIf="error">
                <td colspan="4" class="text-center text-danger">{{ error }}</td>
            </tr>
        </tbody>
    </table>
</div>
